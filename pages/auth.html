<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create an account to get AI-powered course recommendations.">
  <title>Login / Sign Up — CourseAI</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>
  <div class="page-wrapper">
    <main>
      <div class="auth-page">
        <div class="auth-container">
          <div class="auth-card">
            <div class="auth-header">
              <a href="../index.html" style="color:var(--primary-600);font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;text-decoration:none;display:block;margin-bottom:var(--space-4);">🎓 CourseAI</a>
              <h2 id="authTitle">Welcome Back</h2>
              <p id="authSubtitle">Log in to access your personalized dashboard</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
              <button class="auth-tab active" data-tab="login" id="loginTab">Log In</button>
              <button class="auth-tab" data-tab="signup" id="signupTab">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
              <div class="form-group">
                <label class="form-label" for="loginEmail">Email</label>
                <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="loginPassword">Password</label>
                <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" required>
              </div>
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
              <p class="auth-footer">Don't have an account? <a href="#" id="switchToSignup">Sign up</a></p>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" id="signupForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="signupName">Full Name</label>
                  <input class="form-input" type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="signupEmail">Email</label>
                  <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="signupPassword">Password</label>
                <input class="form-input" type="password" id="signupPassword" placeholder="Create a strong password" required minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label" for="signupSkillLevel">Skill Level</label>
                <select class="form-select" id="signupSkillLevel">
                  <option value="Beginner">Beginner</option>
                  <option value="Intermediate">Intermediate</option>
                  <option value="Advanced">Advanced</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="signupCareerGoal">Career Goal</label>
                <select class="form-select" id="signupCareerGoal">
                  <option value="">Select a career goal...</option>
                  <option value="Data Scientist">Data Scientist</option>
                  <option value="Full Stack Developer">Full Stack Developer</option>
                  <option value="Machine Learning Engineer">Machine Learning Engineer</option>
                  <option value="Cloud Architect">Cloud Architect</option>
                  <option value="Cybersecurity Analyst">Cybersecurity Analyst</option>
                  <option value="Mobile App Developer">Mobile App Developer</option>
                  <option value="AI Engineer">AI Engineer</option>
                  <option value="UI/UX Designer">UI/UX Designer</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Interests (select multiple)</label>
                <div class="interests-grid" id="interestsGrid"></div>
              </div>
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
              <p class="auth-footer">Already have an account? <a href="#" id="switchToLogin">Log in</a></p>
            </form>

            <div id="authMessage" style="margin-top:var(--space-4);text-align:center;font-size:var(--text-sm);display:none;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/pages/auth-page.js"></script>
</body>
</html>
