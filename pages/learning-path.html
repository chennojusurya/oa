<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate AI-powered learning paths for your career goals. Get step-by-step roadmaps with curated courses.">
  <title>Learning Path Generator — Online Course Aggregator</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/learning-path.css">
</head>
<body>
  <div class="page-wrapper">
    <main>
      <div class="container">
        <div class="lp-header">
          <h1>🗺️ Learning Path Generator</h1>
          <p>Enter your career goal and get an AI-generated step-by-step roadmap with curated courses</p>
        </div>

        <!-- Input Section -->
        <div class="lp-input-section" id="lpInput">
          <div class="lp-input-group">
            <input type="text" id="careerGoalInput" placeholder="Enter your career goal, e.g. Data Scientist..." aria-label="Career goal">
            <button class="btn btn-primary btn-lg" id="generateBtn">Generate Path</button>
          </div>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-4);">Or choose a popular career:</p>
          <div class="lp-suggestions" id="careerSuggestions"></div>
        </div>

        <!-- Result Section -->
        <div id="lpResult"></div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/pages/learning-path.js"></script>
</body>
</html>
